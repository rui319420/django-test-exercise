{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" type="text/css" href="{% static 'todo/style.css' %}">
    
    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          document.documentElement.setAttribute('data-theme', savedTheme);
        }
      })();
    </script>
  </head>

  <body>
    <button class="theme-toggle-btn" id="themeToggleBtn">🌙</button>
    

    <main class="page-shell">
      <section class="hero-card">
        <p class="eyebrow">Task manager</p>
        <h1>Sample To Do Application</h1>
        <p class="hero-copy">Add tasks, narrow them down instantly, and keep the important ones in view.</p>
        
        <div style="margin-top: 1.5rem;">
          <a href="{% url 'minesweeper' %}" style="display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; background-color: var(--sea-green); color: var(--white); text-decoration: none; font-weight: bold; font-size: 0.9rem; border: 1px solid var(--border-light); transition: all 0.3s;">Play Minesweeper 🎮</a>
        </div>
      </section>

      <section class="panel-grid">
        <form class="task-form" action="{% url 'index' %}" method="post">
          {% csrf_token %}
          <div>
            <label for="titleInput">Title</label>
            <input id="titleInput" name="title" type="text" placeholder="Input title" required>
          </div>
          <div>
            <label for="dueInput">Due at</label>
            <input id="dueInput" name="due_at" type="datetime-local">
          </div>
          <div>
            <label for="priorityInput">Priority</label>
            <select id="priorityInput" name="priority" style="width: 100%; padding: 0.8rem 1rem; border: 2px solid var(--border-light); border-radius: 6px; font-size: 1rem; font-family: inherit; background-color: var(--white); color: var(--text-dark); transition: border-color 0.3s;">
              <option value="0">Low</option>
              <option value="1" selected>Medium</option>
              <option value="2">High</option>
            </select>
          </div>
          <div>
            <button type="submit">Submit</button>
          </div>
        </form>

        <section class="search-panel">
          <form class="search-form" action="{% url 'index' %}" method="get">
            {% if current_order %}
            <input type="hidden" name="order" value="{{ current_order }}">
            {% endif %}
            {% if show_favorites_only %}
            <input type="hidden" name="favorite" value="1">
            {% endif %}
            <label for="searchInput">Search tasks</label>
            <div class="search-row">
              <input id="searchInput" name="q" type="search" placeholder="Search by title" value="{{ search_query }}">
              <button type="submit">Search</button>
            </div>
          </form>

          <div class="toolbar">
            <div class="toolbar-group">
              <span class="toolbar-label">Sort</span>
              <a class="chip {% if current_order == 'due' %}is-active{% endif %}" href="{% url 'index' %}?{{ sort_by_due_query }}">Due Date</a>
              <a class="chip {% if current_order == 'priority' %}is-active{% endif %}" href="{% url 'index' %}?order=priority">Priority</a>
              <a class="chip {% if current_order != 'due' and current_order != 'priority' %}is-active{% endif %}" href="{% url 'index' %}?{{ sort_by_post_

{% load static %}
<!DOCTYPE html>
<html lang="ja">

  <head>
    <title>To Do Application</title>
    <meta charset="UTF-8">
    <meta name="author" content="INIAD">
    <link rel="stylesheet" type="text/css" href="{% static 'todo/style.css' %}">

    <script>
      (function() {
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme) {
          document.documentElement.setAttribute('data-theme', savedTheme);
        }
      })();
    </script>
  </head>

  <body>
    <button class="theme-toggle-btn" id="themeToggleBtn">🌙</button>

    <h1>Edit task</h1>
    <p>You can edit tasks from the following form.</p>
    <form action="{% url 'update' task.id %}" method="post">
      {% csrf_token %}
      <div>
        <label for="titleInput">Title</label><br>
        <input id="titleInput" name="title" type="text" placeholder="Input title" value="{{ task.title }}">
      </div>
      <div>
        <label for="dueInput">Due at:</label><br>
        <input id="dueInput" name="due_at" type="datetime-local" value="{{ task.due_at |date:"Y-m-d H:i" }}">
      </div>
      <div>
        <label for="priorityInput">Priority</label><br>
        <select id="priorityInput" name="priority">
          <option value="0" {% if task.priority == 0 %}selected{% endif %}>Low</option>
          <option value="1" {% if task.priority == 1 %}selected{% endif %}>Medium</option>
          <option value="2" {% if task.priority == 2 %}selected{% endif %}>High</option>
        </select>
      </div>
      <div>
        <button type="submit">Submit</button>
      </div>
    </form>
    <br>

    <script>
      const toggleBtn = document.getElementById('themeToggleBtn');
      
      function updateButtonText(theme) {
        toggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';
      }

      const currentTheme = document.documentElement.getAttribute('data-theme') || 
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      updateButtonText(currentTheme);

      toggleBtn.addEventListener('click', () => {
        let theme = document.documentElement.getAttribute('data-theme');
        if (!theme) {
          theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        const newTheme = theme === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateButtonText(newTheme);
      });
    </script>
  </body>

</html>
